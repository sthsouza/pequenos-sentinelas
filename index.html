<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pequenos Sentinelas</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="stylesheet.css">
</head>
<body>

<!-- HEADER -->
<header>
  <div class="header-inner">
    <div class="badge">Clube de Aventureiros</div>
    <h1 class="club-name">Pequenos<br><span>Sentinelas</span></h1>
  </div>
</header>

<!-- FOTO DO CLUBE -->
<section class="photo-section">
  <div class="photo-frame">
    <div class="photo-border"></div>
    <div class="photo-area">
      <img src="aventureiros-capa.jpeg" alt="Foto do clube Pequenos Sentinelas">
    </div>
  </div>
  <p class="photo-caption">Nossa turma</p>
</section>

<!-- MENU -->
<section class="menu-section">
  <p class="menu-title">✦ Menu principal ✦</p>
  <div class="menu-grid">

    <a href="https://drive.google.com/drive/folders/1hqdjeAHg34j2pEK0x5rT8E0O0y8ucYGc?usp=drive_link"
   target="_blank"
   class="menu-btn btn-fotos"
   onclick="handleBtn(this, 'Fotos')">

  <span class="btn-emoji">📁</span>
  <span class="btn-label">Drive</span>
  <span class="btn-sub">Documentos e fotos</span>

</a>

<a href="https://docs.google.com/spreadsheets/d/1hh08dzj9LweVZq24YKBhHjDeOfzZ2F12zhqFvXjIp3Q/edit?usp=sharing"
   target="_blank"
   class="menu-btn btn-ranking"
   onclick="handleBtn(this, 'Ranking')">

  <span class="btn-emoji">🏆</span>
  <span class="btn-label">Ranking</span>
  <span class="btn-sub">Pontuação geral</span>

</a>

<a href="https://drive.google.com/file/d/1QD_7MnbNDdaPuNyQ6XqPqk5eEShAzWUC/view?usp=sharing"
   target="_blank"
   class="menu-btn btn-agenda"
   onclick="handleBtn(this, 'Agenda')">

  <span class="btn-emoji">📅</span>
  <span class="btn-label">Agenda</span>
  <span class="btn-sub">Próximos eventos</span>

</a>

<a href="https://docs.google.com/spreadsheets/d/1KQ8Hl9TU4H0FYVEznYaZTAKZIC0eNhgtWgDiRuxFUxA/edit?usp=sharing"
   target="_blank"
   class="menu-btn btn-chamada"
   onclick="handleBtn(this, 'Chamada')">

  <span class="btn-emoji">✅</span>
  <span class="btn-label">Chamada</span>
  <span class="btn-sub">Presença do dia</span>

</a>
  </div>
</section>

<footer>
  Clube de Aventureiros <span>Pequenos Sentinelas</span> 2026
</footer>

<script src="script.js"></script>
</body>
</html>
